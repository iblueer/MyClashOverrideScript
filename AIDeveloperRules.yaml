name: AIDeveloperRules
desc: Rules for AI Developer Services

rule-providers:
  github:
    type: http
    behavior: domain
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.yaml
    path: ./ruleset/github.yaml
    interval: 86400

  openai:
    type: http
    behavior: domain
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.yaml
    path: ./ruleset/openai.yaml
    interval: 86400

  gemini:
    type: http
    behavior: domain
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Gemini/Gemini.yaml
    path: ./ruleset/gemini.yaml
    interval: 86400

  claude:
    type: http
    behavior: domain
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Claude/Claude.yaml
    path: ./ruleset/claude.yaml
    interval: 86400

+rules:
  - RULE-SET,github,GLOBAL
  - RULE-SET,openai,GLOBAL
  - RULE-SET,gemini,GLOBAL
  - RULE-SET,claude,GLOBAL

  - DOMAIN-SUFFIX,qiniu.com,DIRECT
  - DOMAIN-SUFFIX,qiniup.com,DIRECT
  - DOMAIN-SUFFIX,volcengine.com,DIRECT

  - DOMAIN-SUFFIX,anyrouter.top,GLOBAL
  - DOMAIN-SUFFIX,a-ocnfniawgw.cn-shanghai.fcapp.run,DIRECT
